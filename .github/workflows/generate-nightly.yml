name: Generate NZPortable Nightlies.
on:
  schedule:
  - cron: 0 7 * * *
  workflow_dispatch:
  
jobs:
  Generate-Nightly:
    runs-on: ubuntu-latest
    container:
      image: sharkwouter/pspdev
    steps:
      - uses: actions/checkout@v4
      - name: Get apt ready
        run: |
          apt update
          apt install -y zip unzip wget curl git jq
      - name: Assemble Archives
        continue-on-error: false
        working-directory: ./
        run: |
          ./generate-nightly.sh ${{ secrets.GITHUB_TOKEN }}
      - name: Get Build Date
        id: date
        run: echo "::set-output name=date::$(cat release_version.txt)"
      - name: Delete Old Release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait ...
        run: sleep 10
      - name: Release
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-1
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 2
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-2
        if: steps.attempt-1.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 3
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-3
        if: steps.attempt-2.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 4
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-4
        if: steps.attempt-3.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 5
        uses: softprops/action-gh-release@v1
        continue-on-error: false
        id: attempt-5
        if: steps.attempt-4.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
  
  build-flatpak:
    name: Build Flatpak
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    needs: Generate-Nightly
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Map CPU architecture to engine ZIP name
        id: archmap
        run: |
          case "${{ matrix.variant.arch }}" in
            x86_64)
              echo "engine_arch=linux64" >> $GITHUB_OUTPUT
              echo "engine_url=https://github.com/nzp-team/fteqw/releases/download/bleeding-edge/pc-nzp-linux64.zip" >> $GITHUB_OUTPUT
              ;;
            aarch64)
              echo "engine_arch=linux_arm64" >> $GITHUB_OUTPUT
              echo "engine_url=https://github.com/nzp-team/fteqw/releases/download/bleeding-edge/pc-nzp-linux_arm64.zip" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported arch: ${{ matrix.variant.arch }}" && exit 1
              ;;
          esac
      - name: Download Flatpak dependencies + add Flathub remote
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 || true
      - name: Download release files to get sha256s
        run: |
          set -euo pipefail

          # Set engine URL per arch
          ENGINE_URL="${{ steps.archmap.outputs.engine_url }}"

          # Get build string
          wget -q https://github.com/nzp-team/nzportable/releases/download/nightly/build-version.txt
          BUILD_STRING=$(cat build-version.txt)

          # Download common/module archives (NZ:P assets/QC)
          wget -q https://github.com/nzp-team/assets/releases/download/newest/pc-nzp-assets.zip -O pc-nzp-assets.zip
          wget -q https://github.com/nzp-team/quakec/releases/download/bleeding-edge/fte-nzp-qc.zip -O fte-nzp-qc.zip

          # Download engine ZIP
          wget -q "$ENGINE_URL" -O fte-nzp-engine.zip

          # Get sha256s
          ASSETS_SHA=$(sha256sum pc-nzp-assets.zip | cut -d' ' -f1)
          QUAKEC_SHA=$(sha256sum fte-nzp-qc.zip | cut -d' ' -f1)
          FTEQW_SHA=$(sha256sum fte-nzp-engine.zip | cut -d' ' -f1)

          # Replace placeholders in manifest
          sed -i "s/ASSETS_SHA256_REPLACE/${ASSETS_SHA}/" gay.nzp.nzportable.json
          sed -i "s/QC_SHA256_REPLACE/${QUAKEC_SHA}/" gay.nzp.nzportable.json
          if [ "${{ matrix.variant.arch }}" = "x86_64" ]; then
            sed -i "s/FTEQW64_SHA256_REPLACE/${FTEQW_SHA}/" gay.nzp.nzportable.json
          else
            sed -i "s/FTEQWARCH64_SHA256_REPLACE/${FTEQW_SHA}/" gay.nzp.nzportable.json
          fi
          sed -i "s/\"nightly\"/\"${BUILD_STRING}\"/" gay.nzp.nzportable.json

          cat gay.nzp.nzportable.json
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: nzportable-${{ steps.archmap.outputs.engine_arch }}.flatpak
          manifest-path: gay.nzp.nzportable.json
          arch: ${{ matrix.variant.arch }}
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.variant.arch }}
          verbose: true
      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          files: nzportable-${{ steps.archmap.outputs.engine_arch }}.flatpak
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-itch:
    name: Deploy to itch.io
    if: github.ref == 'refs/heads/main' && github.repository_owner == 'nzp-team'
    runs-on: ubuntu-latest
    needs:
      - Generate-Nightly
    steps:
      - name: Install WGET
        run: |
          sudo apt update && sudo apt install -y wget
      - name: Download data
        run: |
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/build-version.txt
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-nspire.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-3ds.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linux32.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linux64.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linuxarm64.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linuxarmhf.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-psp.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-switch.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-vita.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-win32.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-win64.zip
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linux64.flatpak
          wget https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linux_arm64.flatpak
      - name: Upload to itch.io - Nintendo 3DS
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-3ds.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: 3ds
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Linux 32-Bit
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-linux32.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: linux-x86
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Linux 64-Bit
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-linux64.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: linux-x86_64
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Linux ARM64
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-linuxarm64.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: linux-arm64
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Linux ARMhf
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-linuxarmhf.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: linux-armhf
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - PlayStation Portable
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-psp.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: psp
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Nintendo Switch
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-switch.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: switch
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - PlayStation VITA
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-vita.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: vita
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Windows 32-bit
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-win32.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: windows-x86
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Windows 64-bit
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-win64.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: windows-x86_64
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - TI-NSPIRE
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.BUTLER_API_KEY}}
          gameData: nzportable-nspire.zip
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: nspire
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Flatpak 64-bit
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butletApiKey: ${{ secrets.BUTLER_API_KEY }}
          gameData: nzportable-linux64.flatpak
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: linux64-flatpak
          buildNumberFile: build-version.txt
      - name: Upload to itch.io - Flatpak ARM64
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butletApiKey: ${{ secrets.BUTLER_API_KEY }}
          gameData: nzportable-linux_arm64.flatpak
          itchUsername: nzp-team
          itchGameId: nazi-zombies-portable
          buildChannel: linux-arm64-flatpak
          buildNumberFile: build-version.txt

